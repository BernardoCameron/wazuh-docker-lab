services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.4
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer:/usr/share/wazuh-indexer/config

  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.4
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: always
    ports:
      - "1514:1514"       # Recepción de eventos de agentes
      - "1515:1515"       # Registro de agentes
      - "514:514/udp"     # Syslog
      - "55000:55000"     # API REST de Wazuh
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - ./config/wazuh_manager:/wazuh-config-mount/etc
    depends_on:
      - wazuh.indexer

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-manager-logs: